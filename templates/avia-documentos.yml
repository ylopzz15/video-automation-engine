title: "AVIA Documentos Test"

output:
  fps: 30
  format: mp4
  path: ./output/avia-documentos.mp4

playwright:
  slowMo: 50
  highlightClicks: true
  showCursor: true
  screenshotOnComplete: true
  headless: true
  persistentContext: true

scenes:
  - id: documentos
    steps:
      - action: goto
        url: https://avia1.com/dashboard
        waitUntil: networkidle

      - action: fill
        selector: "#email"
        value: "${AVIA_EMAIL}"

      - action: fill
        selector: "#password"
        value: "${AVIA_PASSWORD}"

      - action: click
        selector: "button[type='submit']"

      - action: wait
        duration: 5000

      - action: click
        selector: "text=Documentos"

      - action: wait
        duration: 3000
