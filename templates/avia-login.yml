title: "AVIA Pilot Registration"

output:
  fps: 30
  format: mp4
  path: ./output/avia-pilot-registration.mp4

playwright:
  slowMo: 50
  highlightClicks: true
  showCursor: true
  screenshotOnComplete: true
  headless: true
  persistentContext: true

scenes:
  - id: pilot-registration
    steps:
      - action: goto
        url: https://avia1.com/dashboard
        waitUntil: networkidle

      - action: fill
        selector: "#email"
        value: "${AVIA_EMAIL}"

      - action: fill
        selector: "#password"
        value: "${AVIA_PASSWORD}"

      - action: click
        selector: "button[type='submit']"

      - action: wait
        duration: 5000

      - action: click
        selector: "text=Documentos"

      - action: wait
        duration: 2000

      - action: click
        selector: "text=Tripulación"

      - action: wait
        duration: 2000

      - action: click
        selector: "button[aria-label='Registrar Piloto']"

      - action: wait
        duration: 2000

      - action: fill
        selector: "input[name='name']"
        value: "Yanitzy Lopez"

      - action: fill
        selector: "input[name='licenseNumber']"
        value: "PIL12345"

      - action: fill
        selector: "textarea[name='address']"
        value: "Calle Principal 123, Monterrey"

      - action: wait
        duration: 1000

      - action: click
        selector: "button[type='submit']"

      - action: wait
        duration: 3000
